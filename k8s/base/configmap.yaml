apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel-web-config
data:
  APP_NAME: Laravel
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://example.invalid
  LOG_CHANNEL: stderr
  LOG_LEVEL: info
  DB_CONNECTION: sqlite
  DB_DATABASE: /var/www/html/database/database.sqlite
  SESSION_DRIVER: database
  CACHE_STORE: database
  QUEUE_CONNECTION: database
