apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: laravel-staging
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/bdaley/openshift-laravel-pgsql.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: laravel-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
